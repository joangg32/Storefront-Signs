<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rótulo · Rótulos animados</title>
    <link rel="icon" type="image/png" href="./src/icon.png">

    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./rotulo.css">
</head>
<body class="rotulo-page">
    <!--  HEADER ============================================ -->
    <header id="header">
        <nav>
            <ul class="header-menu">
                <li class="header-menu-item">mante_G</li>
                <li class="header-menu-item"><a href="./index.html" class="link-roll">Volver</a></li>
            </ul>
        </nav>
    </header>

    <!--  FICHA ============================================ -->
    <main class="ficha">
        <h1 class="ficha-titulo" id="titulo">Rótulo</h1>

        <div class="ficha-grid">
            <!-- Columna izquierda: foto original -->
            <figure class="ficha-original">
                <figcaption>Original</figcaption>
                <img id="original" src="" alt="">
            </figure>

            <!-- Columna derecha: representación SVG animada -->
            <figure class="ficha-svg">
                <figcaption>Representación</figcaption>
                <div class="svg-holder" id="svg-holder">
                    <p class="svg-aviso" id="svg-aviso">Cargando…</p>
                </div>
                <button class="btn-replay" id="replay" type="button" hidden>↻ Repetir trazo</button>
            </figure>
        </div>

        <!--  DESCRIPCIÓN ============================ -->
        <section class="ficha-texto">
            <div class="bloque">
                <h2>Ubicación</h2>
                <p id="ubicacion"></p>
            </div>
            <div class="bloque">
                <h2>Historia</h2>
                <p id="historia"></p>
            </div>
        </section>
    </main>

    <script src="./rotulos.js"></script>
    <script src="./rotulo.js" defer></script>
</body>
</html>

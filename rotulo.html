<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rótulo · Rótulos valencianos</title>
    <link rel="icon" type="image/svg+xml" href="./src/icon.svg">

    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ballet:opsz@16..72&family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./rotulo.css">
</head>
<body class="rotulo-page">
    <!--  HEADER ============================================ -->
    <header id="header">
        <nav>
            <ul class="header-menu">
                <li class="header-menu-item"><a href="./index.html#home" class="link-roll">Home</a></li>
                <li class="header-menu-item"><a href="./info.html" class="link-roll">+Info</a></li>
            </ul>
        </nav>
    </header>

    <!--  FICHA ============================================ -->
    <main class="ficha">
        <h1 class="ficha-titulo" id="titulo">Rótulo</h1>

        <div class="ficha-grid">
            <!-- Columna izquierda: foto original -->
            <figure class="ficha-original">
                <img id="original" src="" alt="">
            </figure>

            <!-- Columna derecha: descripción del letrero -->
            <div class="ficha-descripcion">
                <p class="ficha-descripcion-texto" id="descripcion"></p>

                <!-- Fecha de la fotografía (solo si existe) -->
                <p class="ficha-meta" id="meta"></p>

                <!-- Navegación entre rótulos -->
                <nav class="ficha-nav">
                    <a class="ficha-nav-boton" id="nav-prev" href="#">&larr; Anterior</a>
                    <a class="ficha-nav-boton" id="nav-next" href="#">Siguiente &rarr;</a>
                </nav>
            </div>
        </div>
    </main>

    <script src="./rotulos.js"></script>
    <script src="./rotulo.js" defer></script>
    <script src="./transition.js" defer></script>
</body>
</html>
